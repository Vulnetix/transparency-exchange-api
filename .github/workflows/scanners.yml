name: Third-Party Scanners

# Runs well-known third-party security scanners, has each emit SARIF or
# CycloneDX (prefer CycloneDX for SBOM/dependency tools, SARIF for findings),
# uploads every result as a workflow artifact, then a single `publish` job runs
# `vulnetix gha upload` which auto-collects all run artifacts and sends them to
# the Vulnetix backend.
#
# Runner: scan jobs use `ubuntu-latest` because the marketplace/dockerized
# scanner tooling self-provisions there. If GitHub-hosted runners are
# unavailable, switch `runs-on` to your self-hosted label (e.g. [self-hosted,
# Linux, X64, vulnetix-local]) and ensure the tools/docker are present.
# Bucket: TypeScript (Yarn)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  VULNETIX_VERSION: v3.59.4

jobs:
  osv-scanner:
    name: OSV-Scanner (SCA)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Run OSV-Scanner
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --format=sarif
            --output=osv.sarif
            ./
      - uses: actions/upload-artifact@v6
        with:
          name: osv-scanner
          path: osv.sarif
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  semgrep:
    name: Semgrep (SAST)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Run Semgrep
        continue-on-error: true
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif .
      - uses: actions/upload-artifact@v6
        with:
          name: semgrep
          path: semgrep.sarif
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  syft:
    name: Syft (CycloneDX SBOM)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Generate CycloneDX SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: syft
          path: sbom.cdx.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  trivy-fs:
    name: Trivy (filesystem CDX + SARIF)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Trivy filesystem (CycloneDX)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: trivy-fs.cdx.json
      - name: Trivy filesystem (SARIF)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
      - uses: actions/upload-artifact@v6
        with:
          name: trivy-fs
          path: |
            trivy-fs.cdx.json
            trivy-fs.sarif
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  grype:
    name: Grype (SCA)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Run Grype
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@v7
        with:
          path: .
          output-format: sarif
          fail-build: false
      - name: Stage Grype SARIF
        continue-on-error: true
        run: cp "${{ steps.grype.outputs.sarif }}" grype.sarif || true
      - uses: actions/upload-artifact@v6
        with:
          name: grype
          path: grype.sarif
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  yarn-cyclonedx:
    name: Yarn CycloneDX SBOM
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate CycloneDX SBOM (cdxgen)
        continue-on-error: true
        run: npx -y @cyclonedx/cdxgen@11 -t js -o yarn.cdx.json . || true
      - uses: actions/upload-artifact@v6
        with:
          name: yarn-cyclonedx
          path: yarn.cdx.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  sbom-spdx:
    name: Syft (SPDX SBOM)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Generate SPDX SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  zizmor:
    name: zizmor (GitHub Actions SAST)
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    steps:
      - uses: actions/checkout@v5
      - name: Run zizmor
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -m pip install --quiet zizmor
          zizmor --format sarif . > zizmor.sarif || true
      - uses: actions/upload-artifact@v6
        with:
          name: zizmor
          path: zizmor.sarif
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  publish:
    name: Publish to Vulnetix
    runs-on: [self-hosted, Linux, X64, vulnetix-local]
    needs: [osv-scanner, semgrep, syft, trivy-fs, grype, yarn-cyclonedx, sbom-spdx, zizmor]
    if: always()
    permissions:
      contents: read
      actions: read
    env:
      VULNETIX_ORG_ID: ${{ secrets.VULNETIX_ORG_ID }}
      VULNETIX_API_KEY: ${{ secrets.VULNETIX_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Vulnetix CLI
        run: |
          curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir "$HOME/.local/bin" --version "$VULNETIX_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Upload all scanner artifacts to Vulnetix
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: vulnetix gha upload --org-id "$VULNETIX_ORG_ID" --json --no-banner --no-progress --verbose
